name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller pdfplumber

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "LocCommentPDF" loc_comment_gui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LocCommentPDF
          path: dist/LocCommentPDF.exe
